name: Reps
options:
  bundleIdPrefix: com.romerosoft
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  MuscleMap:
    url: https://github.com/melihcolpan/MuscleMap.git
    from: 1.6.4
targets:
  Reps:
    type: application
    platform: iOS
    sources:
      - path: Reps
    info:
      path: Reps/Info.plist
      properties:
        CFBundleDisplayName: Reps
        UILaunchScreen: {}
        NSHealthShareUsageDescription: Reps uses Apple Health to read your body weight and height so your fitness progress stays up to date.
        NSHealthUpdateUsageDescription: Reps can save your body weight and height entries to Apple Health when you choose to sync them.
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.romerosoft.repsfitness
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_ENTITLEMENTS: Reps/Reps.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - sdk: HealthKit.framework
      - sdk: Charts.framework
      - sdk: SwiftData.framework
      - package: MuscleMap
  RepsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RepsTests
    dependencies:
      - target: Reps
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.romerosoft.repsfitness.tests
