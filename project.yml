name: Reps
options:
  bundleIdPrefix: com.romerodev
  developmentLanguage: es
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  xcodeVersion: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: L2B56644F5
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 100202606111
    SWIFT_VERSION: 6.0
    LOCALIZED_STRING_SWIFT_SYMBOLS_GENERATION: "YES"
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
packages:
  MuscleMap:
    url: https://github.com/melihcolpan/MuscleMap.git
    from: 1.6.4
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 12.14.0
targets:
  Reps:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Reps
      - path: RepsShared
    info:
      path: Reps/Info.plist
      properties:
        CFBundleDisplayName: StreakRep
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSAppleMusicUsageDescription: StreakRep necesita acceso a tu biblioteca de música para reproducir playlists motivacionales durante tus entrenamientos.
        NSCameraUsageDescription: StreakRep necesita acceso a la cámara para tomar fotos de progreso y asociarlas a tus entrenamientos.
        NSMicrophoneUsageDescription: StreakRep necesita acceso al micrófono para grabar notas de voz dentro de tus entrenamientos.
        NSHealthShareUsageDescription: StreakRep lee datos de Apple Health como peso, altura, pasos, calorías, hidratación, ejercicio, pulso y entrenos para mostrar tu progreso y recuperación.
        NSHealthUpdateUsageDescription: StreakRep puede guardar en Apple Health tus métricas corporales, hidratación, energía ingerida y entrenos cuando eliges sincronizarlos.
        NSLocationWhenInUseUsageDescription: StreakRep necesita tu ubicación para registrar tus rutas de carrera y cardio al aire libre en tiempo real.
        NSMotionUsageDescription: StreakRep usa sensores de movimiento para detectar caminata o carrera y sugerir reanudar una ruta pausada.
        NSPhotoLibraryAddUsageDescription: StreakRep necesita permiso para guardar imágenes de progreso cuando eliges exportarlas o compartirlas.
        NSPhotoLibraryUsageDescription: StreakRep necesita acceso a tus fotos para seleccionar imágenes de progreso y asociarlas a tu perfil o entrenamientos.
        RepsProICloudRecordIDHashes:
          - 69c0dc20d15124f24860efa6345787972b5cc2ebe6f3646fe44cdfe1a5e37ca9
        NSSupportsLiveActivities: true
        NSUbiquitousContainers:
          iCloud.com.romerodev.repsfitness:
            NSUbiquitousContainerIsDocumentScopePublic: false
            NSUbiquitousContainerName: StreakRep
            NSUbiquitousContainerSupportedFolderLevels: None
        UIApplicationSupportsIndirectInputEvents: true
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        CFBundleURLTypes:
          - CFBundleURLName: com.romerodev.repsfitness
            CFBundleURLSchemes:
              - reps
    entitlements:
      path: Reps/Reps.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.romerodev.repsfitness
        com.apple.developer.icloud-services:
          - CloudKit
          - CloudDocuments
        com.apple.security.application-groups:
          - group.com.romerodev.repsfitness
    dependencies:
      - package: MuscleMap
      - package: firebase-ios-sdk
        product: FirebaseAnalytics
      - package: firebase-ios-sdk
        product: FirebaseAnalyticsCore
      - package: firebase-ios-sdk
        product: FirebaseAnalyticsIdentitySupport
      - package: firebase-ios-sdk
        product: FirebaseCore
      - package: firebase-ios-sdk
        product: FirebaseCrashlytics
      - target: RepsWidgets
        embed: true
      - target: RepsWatch Watch App
        embed: true
    postBuildScripts:
      - name: Firebase Crashlytics
        script: |
          "${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
          mkdir -p "${DERIVED_FILE_DIR}/Crashlytics"
          touch "${DERIVED_FILE_DIR}/Crashlytics/${TARGET_NAME}-${CURRENT_PROJECT_VERSION}.stamp"
        basedOnDependencyAnalysis: true
        inputFiles:
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}"
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${TARGET_NAME}"
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Info.plist"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GoogleService-Info.plist"
          - "$(TARGET_BUILD_DIR)/$(EXECUTABLE_PATH)"
          - "$(TARGET_BUILD_DIR)/$(PRODUCT_NAME).debug.dylib"
        outputFiles:
          - "${DERIVED_FILE_DIR}/Crashlytics/${TARGET_NAME}-${CURRENT_PROJECT_VERSION}.stamp"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.romerodev.repsfitness
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: StreakRepFit2
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.healthcare-fitness
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"

  RepsWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RepsWidgets
      - path: RepsShared
      - path: Reps/Resources/Localizable.xcstrings
      - path: RepsWidgets/InfoPlist.xcstrings
    info:
      path: RepsWidgets/Info.plist
      properties:
        CFBundleDisplayName: StreakRep
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: RepsWidgets/RepsWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.romerodev.repsfitness
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.romerodev.repsfitness.widgets
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
  RepsWatch Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: RepsWatch
      - path: RepsShared
      - path: Reps/Resources/Localizable.xcstrings
      - path: RepsWatch/InfoPlist.xcstrings
    info:
      path: RepsWatch/Info.plist
      properties:
        CFBundleDisplayName: StreakRep
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHealthShareUsageDescription: StreakRep Watch lee pulso y calorías durante el entreno para mostrar tus vitales en directo.
        NSHealthUpdateUsageDescription: StreakRep Watch guarda sesiones de entrenamiento iniciadas desde el reloj.
        NSLocationWhenInUseUsageDescription: StreakRep Watch usa tu ubicación para dibujar la ruta de caminatas y carreras iniciadas desde el reloj.
        NSMotionUsageDescription: StreakRep Watch usa el movimiento y podómetro para mostrar pasos y distancia durante caminatas y carreras.
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.romerodev.repsfitness
    entitlements:
      path: RepsWatch/RepsWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.com.romerodev.repsfitness
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.romerodev.repsfitness.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
  RepsTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RepsTests
    dependencies:
      - target: Reps
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.romerodev.repsfitness.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Reps.app/Reps"
        BUNDLE_LOADER: "$(TEST_HOST)"
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"
schemes:
  Reps:
    build:
      targets:
        Reps: all
    test:
      targets:
        - RepsTests
  RepsWidgets:
    build:
      targets:
        RepsWidgets: all
        Reps: all
  RepsWatch Watch App:
    build:
      targets:
        RepsWatch Watch App: all
        Reps: all
  RepsWatch Watch App (Notification):
    build:
      targets:
        RepsWatch Watch App: all
        Reps: all
