name: Reps
options:
  bundleIdPrefix: com.romerosoft
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  xcodeVersion: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: L2B56644F5
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 6.0
packages:
  MuscleMap:
    url: https://github.com/melihcolpan/MuscleMap.git
    from: 1.6.4
targets:
  Reps:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Reps
      - path: RepsShared
    info:
      path: Reps/Info.plist
      properties:
        CFBundleDisplayName: Reps
        NSAppleMusicUsageDescription: Reps necesita acceso a tu biblioteca de música para reproducir playlists motivacionales durante tus entrenamientos.
        NSHealthShareUsageDescription: Reps lee datos de Apple Health como peso, altura, pasos, calorías, hidratación, ejercicio, pulso y entrenos para mostrar tu progreso y recuperación.
        NSHealthUpdateUsageDescription: Reps puede guardar en Apple Health tus métricas corporales, hidratación, energía ingerida y entrenos cuando eliges sincronizarlos.
        NSLocationWhenInUseUsageDescription: Reps necesita tu ubicación para registrar tus rutas de carrera y cardio al aire libre en tiempo real.
        NSSupportsLiveActivities: true
        UIApplicationSupportsIndirectInputEvents: true
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        CFBundleURLTypes:
          - CFBundleURLName: com.romerosoft.repsfitness
            CFBundleURLSchemes:
              - reps
    entitlements:
      path: Reps/Reps.entitlements
    dependencies:
      - package: MuscleMap
      - target: RepsWidgets
        embed: true
      - target: RepsWatch Watch App
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.romerosoft.repsfitness
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.healthcare-fitness
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
  RepsWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RepsWidgets
      - path: RepsShared
    info:
      path: RepsWidgets/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: RepsWidgets/RepsWidgets.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.romerosoft.repsfitness.widgets
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
  RepsWatch Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: RepsWatch
      - path: RepsShared
    info:
      path: RepsWatch/Info.plist
      properties:
        CFBundleDisplayName: Reps
        NSHealthShareUsageDescription: Reps Watch lee pulso y calorías durante el entreno para mostrar tus vitales en directo.
        NSHealthUpdateUsageDescription: Reps Watch guarda sesiones de entrenamiento iniciadas desde el reloj.
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.romerosoft.repsfitness
    entitlements:
      path: RepsWatch/RepsWatch.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.romerosoft.repsfitness.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
  RepsTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RepsTests
    dependencies:
      - target: Reps
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.romerosoft.repsfitness.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Reps.app/Reps"
        BUNDLE_LOADER: "$(TEST_HOST)"
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"
