<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pulse Fitness - Goals</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#653c00",
                        "on-primary-container": "#005814",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f3f3f8",
                        "on-background": "#1a1c1f",
                        "primary-fixed": "#70ff76",
                        "inverse-on-surface": "#f0f0f5",
                        "outline": "#6d7b68",
                        "on-secondary-fixed": "#2b1700",
                        "error-container": "#ffdad6",
                        "surface": "#f9f9fe",
                        "surface-variant": "#e2e2e7",
                        "outline-variant": "#bbcbb5",
                        "on-tertiary-container": "#00489b",
                        "tertiary-fixed": "#d8e2ff",
                        "tertiary-container": "#9bbbff",
                        "surface-dim": "#d9dade",
                        "secondary": "#885200",
                        "surface-container-lowest": "#ffffff",
                        "tertiary": "#005bc1",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#004493",
                        "surface-container-high": "#e8e8ed",
                        "secondary-container": "#fd9d06",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#3d4a3a",
                        "tertiary-fixed-dim": "#adc6ff",
                        "on-primary-fixed": "#002204",
                        "primary-container": "#32d74b",
                        "on-primary-fixed-variant": "#005313",
                        "secondary-fixed": "#ffddbb",
                        "surface-container": "#ededf2",
                        "primary": "#006e1c",
                        "on-tertiary-fixed": "#001a41",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9fe",
                        "inverse-surface": "#2e3034",
                        "surface-container-highest": "#e2e2e7",
                        "secondary-fixed-dim": "#ffb868",
                        "background": "#f9f9fe",
                        "surface-tint": "#006e1c",
                        "on-surface": "#1a1c1f",
                        "inverse-primary": "#42e355",
                        "primary-fixed-dim": "#42e355",
                        "on-secondary-fixed-variant": "#673d00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "24px",
                        "gutter-stack": "8px",
                        "touch-target": "44px",
                        "margin-page": "16px",
                        "card-padding": "16px"
                    },
                    "fontFamily": {
                        "data-display": ["Inter"],
                        "callout": ["Inter"],
                        "subheadline": ["Inter"],
                        "large-title": ["Inter"],
                        "headline": ["Inter"],
                        "footnote": ["Inter"],
                        "caption-sm": ["Inter"],
                        "body": ["Inter"]
                    },
                    "fontSize": {
                        "data-display": ["48px", { "lineHeight": "52px", "letterSpacing": "-1px", "fontWeight": "800" }],
                        "callout": ["16px", { "lineHeight": "21px", "letterSpacing": "-0.32px", "fontWeight": "400" }],
                        "subheadline": ["15px", { "lineHeight": "20px", "letterSpacing": "-0.24px", "fontWeight": "400" }],
                        "large-title": ["34px", { "lineHeight": "41px", "letterSpacing": "0.37px", "fontWeight": "700" }],
                        "headline": ["17px", { "lineHeight": "22px", "letterSpacing": "-0.41px", "fontWeight": "600" }],
                        "footnote": ["13px", { "lineHeight": "18px", "letterSpacing": "-0.08px", "fontWeight": "400" }],
                        "caption-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0px", "fontWeight": "400" }],
                        "body": ["17px", { "lineHeight": "22px", "letterSpacing": "-0.41px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased pb-32">
<!-- TopAppBar -->
<header class="bg-surface-dim/80 backdrop-blur-md flex justify-between items-center px-margin-page h-touch-target w-full sticky top-0 z-40 transition-transform active:scale-95 shadow-sm">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="person">person</span>
</div>
<h1 class="font-headline text-headline text-primary dark:text-primary-fixed-dim">Pulse Fitness</h1>
<button class="hover:opacity-80 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="add">add</span>
</button>
</header>
<main class="max-w-md mx-auto w-full pt-4">
<!-- Page Header -->
<section class="px-margin-page mb-section-gap">
<h2 class="font-large-title text-large-title text-on-surface">Goals</h2>
</section>
<!-- Active Goals Section -->
<section class="mb-section-gap">
<h3 class="font-headline text-headline text-on-surface px-margin-page mb-gutter-stack">Active Goals</h3>
<!-- Goal Card: Bench Press -->
<div class="bg-surface-container-lowest rounded-xl p-card-padding mx-margin-page mb-4 shadow-[0px_4px_12px_rgba(0,0,0,0.05)] border border-surface-variant/50 relative overflow-hidden group">
<div class="absolute top-0 left-0 w-1 h-full bg-primary opacity-80"></div>
<div class="flex justify-between items-start mb-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<div>
<h4 class="font-headline text-headline text-on-surface">Bench Press Max</h4>
<p class="font-footnote text-footnote text-on-surface-variant">Strength Training</p>
</div>
</div>
<div class="text-right">
<p class="font-headline text-headline text-on-surface">205 <span class="font-footnote text-footnote text-on-surface-variant">lbs</span></p>
<p class="font-caption-sm text-caption-sm text-primary font-medium mt-0.5">Target: 225</p>
</div>
</div>
<div class="w-full h-[6px] bg-primary/10 rounded-full overflow-hidden relative">
<div class="absolute top-0 left-0 h-full bg-primary rounded-full transition-all duration-1000 ease-out" style="width: 91%;"></div>
</div>
<div class="flex justify-between mt-2">
<span class="font-caption-sm text-caption-sm text-on-surface-variant">91% Completed</span>
<span class="font-caption-sm text-caption-sm text-on-surface-variant">20 lbs to go</span>
</div>
</div>
<!-- Goal Card: Body Weight -->
<div class="bg-surface-container-lowest rounded-xl p-card-padding mx-margin-page mb-4 shadow-[0px_4px_12px_rgba(0,0,0,0.05)] border border-surface-variant/50 relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-secondary-container opacity-80"></div>
<div class="flex justify-between items-start mb-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-secondary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container">monitor_weight</span>
</div>
<div>
<h4 class="font-headline text-headline text-on-surface">Body Weight</h4>
<p class="font-footnote text-footnote text-on-surface-variant">Health Metric</p>
</div>
</div>
<div class="text-right">
<p class="font-headline text-headline text-on-surface">78 <span class="font-footnote text-footnote text-on-surface-variant">kg</span></p>
<p class="font-caption-sm text-caption-sm text-secondary font-medium mt-0.5">Target: 75</p>
</div>
</div>
<div class="w-full h-[6px] bg-secondary-container/20 rounded-full overflow-hidden relative">
<!-- Representing progress towards losing 3kg. Assuming start was 80kg for visual sake. (80-78)/(80-75) = 2/5 = 40% -->
<div class="absolute top-0 left-0 h-full bg-secondary-container rounded-full transition-all duration-1000 ease-out" style="width: 40%;"></div>
</div>
<div class="flex justify-between mt-2">
<span class="font-caption-sm text-caption-sm text-on-surface-variant">Trending down</span>
<span class="font-caption-sm text-caption-sm text-on-surface-variant">3 kg to go</span>
</div>
</div>
</section>
<!-- Completed Goals Section -->
<section class="mb-section-gap">
<h3 class="font-headline text-headline text-on-surface px-margin-page mb-gutter-stack">Completed</h3>
<div class="bg-surface-container-low rounded-xl p-card-padding mx-margin-page opacity-80 border border-surface-variant/30 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-sm" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div>
<h4 class="font-subheadline text-subheadline text-on-surface line-through decoration-outline-variant">Run 5k Under 25m</h4>
<p class="font-caption-sm text-caption-sm text-on-surface-variant">Completed Oct 12</p>
</div>
</div>
</div>
</section>
<!-- Action Area -->
<div class="px-margin-page mt-section-gap">
<button class="w-full bg-primary text-on-primary font-headline text-headline py-3 rounded-full flex items-center justify-center gap-2 shadow-sm hover:opacity-90 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-lg">add</span>
                Add New Goal
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-surface-dim/90 dark:bg-inverse-surface/90 border-t border-outline-variant/30 docked full-width bottom-0 rounded-t-xl fixed w-full z-50 flex justify-around items-center px-4 pb-8 pt-2 backdrop-blur-md md:hidden">
<!-- Today (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-variant/20 active:scale-90 transition-all duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="today">today</span>
<span class="font-caption-sm text-caption-sm">Today</span>
</button>
<!-- Plans (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-variant/20 active:scale-90 transition-all duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="fitness_center">fitness_center</span>
<span class="font-caption-sm text-caption-sm">Plans</span>
</button>
<!-- Progress (ACTIVE - semantically maps to Goals) -->
<button class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed font-semibold hover:bg-surface-variant/20 active:scale-90 transition-all duration-150 p-2 rounded-lg w-16 relative">
<div class="absolute -top-1 w-8 h-1 bg-primary rounded-b-full"></div>
<span class="material-symbols-outlined mb-1" data-icon="monitoring" data-weight="fill" style="font-variation-settings: 'FILL' 1;">monitoring</span>
<span class="font-caption-sm text-caption-sm">Progress</span>
</button>
<!-- Calendar (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-variant/20 active:scale-90 transition-all duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="calendar_month">calendar_month</span>
<span class="font-caption-sm text-caption-sm">Calendar</span>
</button>
<!-- Profile (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-variant/20 active:scale-90 transition-all duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-caption-sm text-caption-sm">Profile</span>
</button>
</nav>
</body></html>
