<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        .card-shadow {
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col pb-32">
<!-- Top App Bar -->
<header class="bg-background dark:bg-background fixed top-0 w-full z-50 flex justify-between items-center px-margin-page h-element-height-md">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="fitness_center">fitness_center</span>
<h1 class="font-headline text-headline text-on-surface">Pulse</h1>
</div>
<button aria-label="Notifications" class="w-8 h-8 flex items-center justify-center text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-page pt-20 pb-stack-lg flex flex-col gap-stack-lg">
<!-- Page Title -->
<h2 class="font-large-title text-large-title text-on-background tracking-tight">Plans</h2>
<!-- Active Plan Section (Bento/Premium Card) -->
<section class="flex flex-col gap-stack-sm">
<h3 class="font-subheadline text-subheadline text-on-surface-variant uppercase tracking-wider ml-1">Active Plan</h3>
<div class="bg-surface-container-low rounded-lg p-stack-lg card-shadow flex flex-col gap-4 relative overflow-hidden group cursor-pointer active:scale-[0.98] transition-transform duration-200">
<!-- Subtle Gradient Background Element -->
<div class="absolute -top-10 -right-10 w-40 h-40 bg-primary/5 rounded-full blur-2xl pointer-events-none transition-transform group-hover:scale-110"></div>
<div class="flex justify-between items-start z-10">
<div class="flex flex-col gap-1">
<span class="inline-flex items-center gap-1 bg-primary-container text-on-primary-container px-2 py-0.5 rounded-full font-caption-1 text-caption-1 w-fit mb-1">
<span class="material-symbols-outlined text-[14px] fill" data-icon="play_circle">play_circle</span>
                            In Progress
                        </span>
<h4 class="font-title-2 text-title-2 text-on-background">Push Pull Legs</h4>
</div>
<button aria-label="More options" class="text-on-surface-variant hover:text-on-surface p-1 rounded-full hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</button>
</div>
<div class="flex items-center gap-4 text-on-surface-variant z-10 mt-2">
<div class="flex items-center gap-1.5 font-footnote text-footnote">
<span class="material-symbols-outlined text-[18px]" data-icon="fitness_center">fitness_center</span>
                        Gym
                    </div>
<div class="w-[1px] h-4 bg-outline-variant"></div>
<div class="flex items-center gap-1.5 font-footnote text-footnote">
<span class="material-symbols-outlined text-[18px]" data-icon="calendar_month">calendar_month</span>
                        6 Days/Week
                    </div>
</div>
<!-- Progress Bar -->
<div class="w-full h-1.5 bg-surface-variant rounded-full mt-2 z-10 overflow-hidden">
<div class="h-full bg-primary rounded-full w-[45%]" style="width: 45%;"></div>
</div>
<div class="flex justify-between items-center font-caption-1 text-caption-1 text-on-surface-variant z-10">
<span>Week 3 of 8</span>
<span>45% Complete</span>
</div>
</div>
</section>
<!-- Your Plans Section (Inset Grouped List) -->
<section class="flex flex-col gap-stack-sm mt-4">
<h3 class="font-subheadline text-subheadline text-on-surface-variant uppercase tracking-wider ml-1">Your Plans</h3>
<div class="bg-surface-container-low rounded-lg overflow-hidden flex flex-col card-shadow">
<!-- Plan 1 -->
<div class="p-stack-lg flex justify-between items-center hover:bg-surface-container transition-colors cursor-pointer active:bg-surface-variant/30">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="home">home</span>
</div>
<div class="flex flex-col gap-0.5">
<h4 class="font-headline text-headline text-on-background">Home Strength</h4>
<div class="flex items-center gap-1 font-footnote text-footnote text-on-surface-variant">
<span>4 Days/Week</span>
</div>
</div>
</div>
<button aria-label="More options" class="text-on-surface-variant hover:text-on-surface p-2 rounded-full hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</button>
</div>
<!-- Separator -->
<div class="h-[1px] bg-surface-variant ml-[4.5rem]"></div>
<!-- Plan 2 -->
<div class="p-stack-lg flex justify-between items-center hover:bg-surface-container transition-colors cursor-pointer active:bg-surface-variant/30">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="fitness_center">fitness_center</span>
</div>
<div class="flex flex-col gap-0.5">
<h4 class="font-headline text-headline text-on-background">Beginner Full Body</h4>
<div class="flex items-center gap-1 font-footnote text-footnote text-on-surface-variant">
<span>3 Days/Week</span>
</div>
</div>
</div>
<button aria-label="More options" class="text-on-surface-variant hover:text-on-surface p-2 rounded-full hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</button>
</div>
</div>
</section>
</main>
<!-- Floating Action Button -->
<button aria-label="New Plan" class="fixed bottom-24 right-6 w-14 h-14 bg-primary text-on-primary rounded-lg shadow-lg flex items-center justify-center hover:opacity-90 active:scale-90 transition-all duration-200 z-30">
<span class="material-symbols-outlined text-3xl font-medium" data-icon="add">add</span>
</button>
<!-- Bottom Navigation Bar -->
<nav class="bg-surface-container-lowest/80 dark:bg-surface-dim/80 backdrop-blur-md border-t border-outline-variant dark:border-outline fixed bottom-0 w-full z-50 flex justify-around items-center px-2 pb-safe h-16">
<button aria-label="Today" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors active:scale-90 transition-transform duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="today">today</span>
<span class="font-caption-1 text-caption-1 truncate">Today</span>
</button>
<button aria-label="Plans" class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim font-headline hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors active:scale-90 transition-transform duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1 fill" data-icon="assignment" data-weight="fill">assignment</span>
<span class="font-caption-1 text-caption-1 truncate">Plans</span>
</button>
<button aria-label="Progress" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors active:scale-90 transition-transform duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="insights">insights</span>
<span class="font-caption-1 text-caption-1 truncate">Progress</span>
</button>
<button aria-label="Calendar" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors active:scale-90 transition-transform duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="calendar_today">calendar_today</span>
<span class="font-caption-1 text-caption-1 truncate">Calendar</span>
</button>
<button aria-label="Profile" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors active:scale-90 transition-transform duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-caption-1 text-caption-1 truncate">Profile</span>
</button>
</nav>
</body></html>
