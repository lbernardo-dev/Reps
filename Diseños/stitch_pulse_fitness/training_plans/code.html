<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Workout Plans List</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e2e2e7",
                        "primary": "#006e1c",
                        "surface-bright": "#f9f9fe",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#002204",
                        "on-error": "#ffffff",
                        "surface-container": "#ededf2",
                        "outline": "#6d7b68",
                        "surface-dim": "#d9dade",
                        "on-tertiary-container": "#00489b",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#70ff76",
                        "primary-container": "#32d74b",
                        "on-secondary-fixed": "#2b1700",
                        "secondary-fixed-dim": "#ffb868",
                        "on-primary-container": "#005814",
                        "tertiary": "#005bc1",
                        "outline-variant": "#bbcbb5",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#673d00",
                        "on-primary-fixed-variant": "#005313",
                        "on-surface-variant": "#3d4a3a",
                        "error-container": "#ffdad6",
                        "secondary": "#885200",
                        "surface-container-high": "#e8e8ed",
                        "surface-container-low": "#f3f3f8",
                        "surface": "#f9f9fe",
                        "tertiary-fixed-dim": "#adc6ff",
                        "secondary-container": "#fd9d06",
                        "on-surface": "#1a1c1f",
                        "tertiary-container": "#9bbbff",
                        "inverse-surface": "#2e3034",
                        "secondary-fixed": "#ffddbb",
                        "tertiary-fixed": "#d8e2ff",
                        "inverse-primary": "#42e355",
                        "on-secondary-container": "#653c00",
                        "surface-tint": "#006e1c",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#f0f0f5",
                        "primary-fixed-dim": "#42e355",
                        "background": "#f9f9fe",
                        "surface-container-highest": "#e2e2e7",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#001a41",
                        "on-background": "#1a1c1f",
                        "on-tertiary-fixed-variant": "#004493"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1rem"
                    },
                    "spacing": {
                        "section-gap": "24px",
                        "gutter-stack": "8px",
                        "touch-target": "44px",
                        "margin-page": "16px",
                        "card-padding": "16px"
                    },
                    "fontFamily": {
                        "callout": ["Inter"],
                        "large-title": ["Inter"],
                        "headline": ["Inter"],
                        "data-display": ["Inter"],
                        "caption-sm": ["Inter"],
                        "footnote": ["Inter"],
                        "body": ["Inter"],
                        "subheadline": ["Inter"]
                    },
                    "fontSize": {
                        "callout": ["16px", { "lineHeight": "21px", "letterSpacing": "-0.32px", "fontWeight": "400" }],
                        "large-title": ["34px", { "lineHeight": "41px", "letterSpacing": "0.37px", "fontWeight": "700" }],
                        "headline": ["17px", { "lineHeight": "22px", "letterSpacing": "-0.41px", "fontWeight": "600" }],
                        "data-display": ["48px", { "lineHeight": "52px", "letterSpacing": "-1px", "fontWeight": "800" }],
                        "caption-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0px", "fontWeight": "400" }],
                        "footnote": ["13px", { "lineHeight": "18px", "letterSpacing": "-0.08px", "fontWeight": "400" }],
                        "body": ["17px", { "lineHeight": "22px", "letterSpacing": "-0.41px", "fontWeight": "400" }],
                        "subheadline": ["15px", { "lineHeight": "20px", "letterSpacing": "-0.24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Subtle ambient shadow for primary cards */
        .card-shadow {
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col pb-32">
<!-- Top App Bar -->
<header class="bg-surface-dim/80 backdrop-blur-md flex justify-between items-center px-margin-page h-touch-target w-full sticky top-0 z-40">
<div class="flex items-center gap-3">
<img alt="User Avatar" class="w-8 h-8 rounded-full object-cover" data-alt="A small circular profile picture of a young professional wearing a light athletic shirt, smiling subtly against a soft grey background. The image is bright and modern, fitting an energetic fitness app aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBQR8kqqLwwmstzOXg5I_rO8CeTzw4bRSixFMUMCGsMPNo3Qu40N9BlItY0O-Rr8mrGyEZj6hepMHISYD1lyheHyPWp55td7L0OVF5COYUfQwa0NPYU2hx17EId7cvYDbUGKvtrYgYqmynQsXrVFZyBxYEsZwt99rLLvcWcjahB_DPOtK74LbI_yylb6qdJfGmu4j4GXsU9ZMEz3ILqVQLBcXOJ4_UrvilrO_-aFGwvM5YW1jdW_gWQsZxyj_qA4upyeEx-XF5zHT4"/>
<h1 class="font-headline text-headline text-on-surface">Pulse Fitness</h1>
</div>
<button aria-label="Add" class="w-touch-target h-touch-target flex items-center justify-center text-primary hover:opacity-80 active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-page pt-6 pb-section-gap flex flex-col gap-section-gap">
<!-- Page Title -->
<h2 class="font-large-title text-large-title text-on-background tracking-tight">Plans</h2>
<!-- Active Plan Section (Bento/Premium Card) -->
<section class="flex flex-col gap-gutter-stack">
<h3 class="font-subheadline text-subheadline text-on-surface-variant uppercase tracking-wider ml-2">Active Plan</h3>
<div class="bg-surface-container-lowest rounded-2xl p-card-padding card-shadow flex flex-col gap-4 relative overflow-hidden group cursor-pointer active:scale-[0.98] transition-transform duration-200">
<!-- Subtle Gradient Background Element -->
<div class="absolute -top-10 -right-10 w-40 h-40 bg-primary/5 rounded-full blur-2xl pointer-events-none transition-transform group-hover:scale-110"></div>
<div class="flex justify-between items-start z-10">
<div class="flex flex-col gap-1">
<span class="inline-flex items-center gap-1 bg-primary-container/20 text-on-primary-container px-2 py-0.5 rounded-full font-caption-sm text-caption-sm w-fit mb-1">
<span class="material-symbols-outlined text-[14px] fill" data-icon="play_circle">play_circle</span>
                            In Progress
                        </span>
<h4 class="font-headline text-headline text-on-background">Push Pull Legs</h4>
</div>
<button aria-label="More options" class="text-on-surface-variant hover:text-on-surface p-1 rounded-full hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</button>
</div>
<div class="flex items-center gap-4 text-on-surface-variant z-10 mt-2">
<div class="flex items-center gap-1.5 font-footnote text-footnote">
<span class="material-symbols-outlined text-[18px]" data-icon="fitness_center">fitness_center</span>
                        Gym
                    </div>
<div class="w-[1px] h-4 bg-outline-variant/30"></div>
<div class="flex items-center gap-1.5 font-footnote text-footnote">
<span class="material-symbols-outlined text-[18px]" data-icon="calendar_month">calendar_month</span>
                        6 Days/Week
                    </div>
</div>
<!-- Progress Bar -->
<div class="w-full h-1.5 bg-primary/10 rounded-full mt-2 z-10 overflow-hidden">
<div class="h-full bg-primary rounded-full w-[45%]" style="width: 45%;"></div>
</div>
<div class="flex justify-between items-center font-caption-sm text-caption-sm text-on-surface-variant z-10">
<span>Week 3 of 8</span>
<span>45% Complete</span>
</div>
</div>
</section>
<!-- Your Plans Section (Inset Grouped List) -->
<section class="flex flex-col gap-gutter-stack mt-4">
<h3 class="font-subheadline text-subheadline text-on-surface-variant uppercase tracking-wider ml-2">Your Plans</h3>
<div class="bg-surface-container-lowest rounded-2xl card-shadow overflow-hidden flex flex-col">
<!-- Plan 1 -->
<div class="p-card-padding flex justify-between items-center hover:bg-surface-container-low transition-colors cursor-pointer active:bg-surface-variant/30">
<div class="flex flex-col gap-1">
<h4 class="font-body text-body text-on-background font-medium">Home Strength</h4>
<div class="flex items-center gap-3 text-on-surface-variant">
<div class="flex items-center gap-1 font-caption-sm text-caption-sm">
<span class="material-symbols-outlined text-[16px]" data-icon="home">home</span>
                                Home
                            </div>
<div class="flex items-center gap-1 font-caption-sm text-caption-sm">
<span class="material-symbols-outlined text-[16px]" data-icon="calendar_today">calendar_today</span>
                                4 Days/Week
                            </div>
</div>
</div>
<button aria-label="More options" class="text-on-surface-variant hover:text-on-surface p-2 rounded-full hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</button>
</div>
<!-- Separator -->
<div class="h-[0.5px] bg-[#C6C6C8] ml-card-padding"></div>
<!-- Plan 2 -->
<div class="p-card-padding flex justify-between items-center hover:bg-surface-container-low transition-colors cursor-pointer active:bg-surface-variant/30">
<div class="flex flex-col gap-1">
<h4 class="font-body text-body text-on-background font-medium">Beginner Full Body</h4>
<div class="flex items-center gap-3 text-on-surface-variant">
<div class="flex items-center gap-1 font-caption-sm text-caption-sm">
<span class="material-symbols-outlined text-[16px]" data-icon="fitness_center">fitness_center</span>
                                Gym
                            </div>
<div class="flex items-center gap-1 font-caption-sm text-caption-sm">
<span class="material-symbols-outlined text-[16px]" data-icon="calendar_today">calendar_today</span>
                                3 Days/Week
                            </div>
</div>
</div>
<button aria-label="More options" class="text-on-surface-variant hover:text-on-surface p-2 rounded-full hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</button>
</div>
</div>
</section>
</main>
<!-- Floating Action Button -->
<button aria-label="New Plan" class="fixed bottom-28 right-6 w-14 h-14 bg-primary text-on-primary rounded-full shadow-lg flex items-center justify-center hover:opacity-90 active:scale-90 transition-all duration-200 z-30">
<span class="material-symbols-outlined text-3xl font-medium" data-icon="add">add</span>
</button>
<!-- Bottom Navigation Bar (Generated from JSON) -->
<nav class="bg-surface-dim/90 dark:bg-inverse-surface/90 font-caption-sm text-caption-sm docked full-width bottom-0 rounded-t-xl border-t border-outline-variant/30 flat no shadows fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-2 backdrop-blur-lg">
<button aria-label="Today" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-variant/20 active:scale-90 transition-all duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="today">today</span>
<span class="truncate">Today</span>
</button>
<button aria-label="Plans" class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed font-semibold hover:bg-surface-variant/20 active:scale-90 transition-all duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1 fill" data-icon="fitness_center" data-weight="fill">fitness_center</span>
<span class="truncate">Plans</span>
</button>
<button aria-label="Progress" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-variant/20 active:scale-90 transition-all duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="monitoring">monitoring</span>
<span class="truncate">Progress</span>
</button>
<button aria-label="Calendar" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-variant/20 active:scale-90 transition-all duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="calendar_month">calendar_month</span>
<span class="truncate">Calendar</span>
</button>
<button aria-label="Profile" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-variant/20 active:scale-90 transition-all duration-150 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="truncate">Profile</span>
</button>
</nav>
</body></html>
