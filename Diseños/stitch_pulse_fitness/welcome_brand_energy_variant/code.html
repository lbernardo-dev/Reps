<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .text-gradient {
            background: linear-gradient(135deg, #006e1c 0%, #32d74b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-surface text-on-surface h-screen w-full flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<main class="flex-grow flex flex-col items-center justify-between px-margin-page py-12 safe-area-padding max-w-md mx-auto w-full relative overflow-hidden">
<!-- Header / Logo -->
<div class="flex flex-col items-center mt-8 z-10 w-full animate-[fadeInDown_0.8s_ease-out]">
<h1 class="font-data-display text-data-display text-gradient mb-2 tracking-tight">Pulse</h1>
</div>
<!-- Center Graphic -->
<div class="relative w-full aspect-[4/5] max-w-[320px] mx-auto my-auto flex items-center justify-center z-0 animate-[fadeIn_1.2s_ease-out]">
<img alt="Abstract green energy trails swirling in a dark void" class="w-full h-full object-cover rounded-3xl shadow-[0_8px_32px_rgba(0,110,28,0.15)] ring-1 ring-outline-variant/20 mix-blend-multiply" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCO_nnI8DnGuf_jWbz3XQGhJu0G1Nvhbumsi3kxZbN1CN7aNdyaY6oHt7VoIiMKuSJbbtbN8TQNi8SRFCtD1icu6Z_GTqtl5YKWooU-MMB7u4qccumvl6cq9SGWbr4Ov3f5AJgVby1t31XhHRXI3g8vGdNuDMwo1uq5P8I_ry_Tizy79ALNChgkrF_SuQeJr0tlI3r4sP1EX4qToTXPIW6j9O3V3FuobDx3JodEVq0nsH2ERUIRvlMZw3EFDjPdvCfQ2IJgLdAhJko" style="mask-image: radial-gradient(circle, black 60%, transparent 100%); -webkit-mask-image: radial-gradient(circle, black 60%, transparent 100%);"/>
<!-- Decorative atmospheric glows -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-[60px] -z-10 mix-blend-multiply"></div>
</div>
<!-- Footer Content & Actions -->
<div class="w-full flex flex-col items-center gap-section-gap z-10 mt-auto pb-8 animate-[fadeInUp_0.8s_ease-out]">
<div class="text-center px-4 mb-2">
<p class="font-headline text-headline text-on-surface-variant max-w-[280px] mx-auto">
                    Track your training. Reach your goals. Anywhere.
                </p>
</div>
<div class="w-full flex flex-col gap-4">
<button class="w-full h-14 bg-primary text-on-primary rounded-full font-headline text-headline flex items-center justify-center active:scale-[0.98] transition-transform duration-200 shadow-md">
                    Get Started
                </button>
<button class="w-full h-14 bg-transparent text-primary rounded-full font-headline text-headline flex items-center justify-center border-2 border-primary/20 hover:bg-primary/5 active:scale-[0.98] transition-all duration-200">
                    Log In
                </button>
</div>
</div>
</main>
<style>
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @supports (padding: max(0px)) {
            .safe-area-padding {
                padding-top: max(3rem, env(safe-area-inset-top));
                padding-bottom: max(2rem, env(safe-area-inset-bottom));
            }
        }
    </style>
</body></html>
