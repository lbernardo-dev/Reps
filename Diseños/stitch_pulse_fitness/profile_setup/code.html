<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Setup - Tell us about your training</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {

            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e2e2e7",
                        "primary": "#006e1c",
                        "surface-bright": "#f9f9fe",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#002204",
                        "on-error": "#ffffff",
                        "surface-container": "#ededf2",
                        "outline": "#6d7b68",
                        "surface-dim": "#d9dade",
                        "on-tertiary-container": "#00489b",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#70ff76",
                        "primary-container": "#32d74b",
                        "on-secondary-fixed": "#2b1700",
                        "secondary-fixed-dim": "#ffb868",
                        "on-primary-container": "#005814",
                        "tertiary": "#005bc1",
                        "outline-variant": "#bbcbb5",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#673d00",
                        "on-primary-fixed-variant": "#005313",
                        "on-surface-variant": "#3d4a3a",
                        "error-container": "#ffdad6",
                        "secondary": "#885200",
                        "surface-container-high": "#e8e8ed",
                        "surface-container-low": "#f3f3f8",
                        "surface": "#f9f9fe",
                        "tertiary-fixed-dim": "#adc6ff",
                        "secondary-container": "#fd9d06",
                        "on-surface": "#1a1c1f",
                        "tertiary-container": "#9bbbff",
                        "inverse-surface": "#2e3034",
                        "secondary-fixed": "#ffddbb",
                        "tertiary-fixed": "#d8e2ff",
                        "inverse-primary": "#42e355",
                        "on-secondary-container": "#653c00",
                        "surface-tint": "#006e1c",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#f0f0f5",
                        "primary-fixed-dim": "#42e355",
                        "background": "#f9f9fe",
                        "surface-container-highest": "#e2e2e7",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#001a41",
                        "on-background": "#1a1c1f",
                        "on-tertiary-fixed-variant": "#004493"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "24px",
                        "gutter-stack": "8px",
                        "touch-target": "44px",
                        "margin-page": "16px",
                        "card-padding": "16px"
                    },
                    "fontFamily": {
                        "callout": ["Inter"],
                        "large-title": ["Inter"],
                        "headline": ["Inter"],
                        "data-display": ["Inter"],
                        "caption-sm": ["Inter"],
                        "footnote": ["Inter"],
                        "body": ["Inter"],
                        "subheadline": ["Inter"]
                    },
                    "fontSize": {
                        "callout": ["16px", { "lineHeight": "21px", "letterSpacing": "-0.32px", "fontWeight": "400" }],
                        "large-title": ["34px", { "lineHeight": "41px", "letterSpacing": "0.37px", "fontWeight": "700" }],
                        "headline": ["17px", { "lineHeight": "22px", "letterSpacing": "-0.41px", "fontWeight": "600" }],
                        "data-display": ["48px", { "lineHeight": "52px", "letterSpacing": "-1px", "fontWeight": "800" }],
                        "caption-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0px", "fontWeight": "400" }],
                        "footnote": ["13px", { "lineHeight": "18px", "letterSpacing": "-0.08px", "fontWeight": "400" }],
                        "body": ["17px", { "lineHeight": "22px", "letterSpacing": "-0.41px", "fontWeight": "400" }],
                        "subheadline": ["15px", { "lineHeight": "20px", "letterSpacing": "-0.24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Custom styles for interactions and specific iOS feel */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .segmented-control-active {
            background-color: #ffffff;
            color: #1a1c1f;
            box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.12), 0px 3px 1px rgba(0, 0, 0, 0.04);
        }
        .segmented-control-inactive {
            color: #3d4a3a;
            background-color: transparent;
        }
        
        .goal-card-active {
            border-color: #006e1c;
            background-color: #f9f9fe;
        }
        .goal-card-active .goal-icon {
            color: #006e1c;
        }
        
        .progress-bar-fill {
            transition: width 0.4s ease-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-body text-on-surface antialiased min-h-screen flex flex-col selection:bg-primary/20">
<!-- TopAppBar for Transactional/Onboarding Step (Navigation Suppressed) -->
<header class="flex justify-between items-center px-margin-page h-touch-target w-full bg-surface/80 backdrop-blur-md sticky top-0 z-40">
<button aria-label="Go back" class="w-touch-target h-touch-target flex items-center justify-start text-on-surface hover:opacity-80 active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">chevron_left</span>
</button>
<div class="font-headline text-headline text-on-surface">Step 2 of 6</div>
<div class="w-touch-target"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow px-margin-page pb-32">
<!-- Progress Bar -->
<div class="w-full h-[6px] bg-primary/10 rounded-[3px] mt-4 mb-8 overflow-hidden">
<div class="h-full bg-primary rounded-[3px] progress-bar-fill w-2/6"></div>
</div>
<!-- Header -->
<div class="mb-section-gap">
<h1 class="font-large-title text-large-title text-on-surface mb-2">Tell us about your training</h1>
<p class="font-callout text-callout text-on-surface-variant">We'll use this to tailor your Pulse Fitness experience.</p>
</div>
<form class="space-y-section-gap">
<!-- Training Location Segmented Control -->
<div class="space-y-gutter-stack">
<label class="font-headline text-headline text-on-surface block">Training Location</label>
<div class="bg-surface-variant p-1 rounded-xl flex w-full">
<button class="flex-1 py-2 px-4 rounded-lg font-subheadline text-subheadline text-center transition-all duration-200 segmented-control-active" onclick="toggleSegment(this, 'location')" type="button">Gym</button>
<button class="flex-1 py-2 px-4 rounded-lg font-subheadline text-subheadline text-center transition-all duration-200 segmented-control-inactive" onclick="toggleSegment(this, 'location')" type="button">Home</button>
<button class="flex-1 py-2 px-4 rounded-lg font-subheadline text-subheadline text-center transition-all duration-200 segmented-control-inactive" onclick="toggleSegment(this, 'location')" type="button">Both</button>
</div>
</div>
<!-- Main Goal List -->
<div class="space-y-gutter-stack">
<label class="font-headline text-headline text-on-surface block">Main Goal</label>
<div class="grid grid-cols-1 gap-gutter-stack">
<button class="w-full flex items-center justify-between p-card-padding bg-surface-container-lowest rounded-xl border border-outline-variant/30 hover:border-primary/50 transition-colors goal-card-active" onclick="selectGoal(this)" type="button">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined goal-icon text-primary" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<span class="font-body text-body text-on-surface">Build Muscle</span>
</div>
<span class="material-symbols-outlined text-primary opacity-100 check-icon">check_circle</span>
</button>
<button class="w-full flex items-center justify-between p-card-padding bg-surface-container-lowest rounded-xl border border-outline-variant/30 hover:border-primary/50 transition-colors" onclick="selectGoal(this)" type="button">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center transition-colors">
<span class="material-symbols-outlined goal-icon text-on-surface-variant transition-colors" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<span class="font-body text-body text-on-surface">Lose Fat</span>
</div>
<span class="material-symbols-outlined text-primary opacity-0 check-icon transition-opacity">check_circle</span>
</button>
<button class="w-full flex items-center justify-between p-card-padding bg-surface-container-lowest rounded-xl border border-outline-variant/30 hover:border-primary/50 transition-colors" onclick="selectGoal(this)" type="button">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center transition-colors">
<span class="material-symbols-outlined goal-icon text-on-surface-variant transition-colors" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<span class="font-body text-body text-on-surface">Get Stronger</span>
</div>
<span class="material-symbols-outlined text-primary opacity-0 check-icon transition-opacity">check_circle</span>
</button>
<button class="w-full flex items-center justify-between p-card-padding bg-surface-container-lowest rounded-xl border border-outline-variant/30 hover:border-primary/50 transition-colors" onclick="selectGoal(this)" type="button">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center transition-colors">
<span class="material-symbols-outlined goal-icon text-on-surface-variant transition-colors" style="font-variation-settings: 'FILL' 1;">directions_run</span>
</div>
<span class="font-body text-body text-on-surface">Stay Active</span>
</div>
<span class="material-symbols-outlined text-primary opacity-0 check-icon transition-opacity">check_circle</span>
</button>
</div>
</div>
<!-- Experience Segmented Control -->
<div class="space-y-gutter-stack pb-8">
<label class="font-headline text-headline text-on-surface block">Experience Level</label>
<div class="bg-surface-variant p-1 rounded-xl flex w-full">
<button class="flex-1 py-2 px-2 rounded-lg font-subheadline text-subheadline text-center transition-all duration-200 segmented-control-inactive" onclick="toggleSegment(this, 'experience')" type="button">Beginner</button>
<button class="flex-1 py-2 px-2 rounded-lg font-subheadline text-subheadline text-center transition-all duration-200 segmented-control-active" onclick="toggleSegment(this, 'experience')" type="button">Intermediate</button>
<button class="flex-1 py-2 px-2 rounded-lg font-subheadline text-subheadline text-center transition-all duration-200 segmented-control-inactive" onclick="toggleSegment(this, 'experience')" type="button">Advanced</button>
</div>
</div>
</form>
</main>
<!-- Bottom Fixed Action Button -->
<div class="fixed bottom-0 left-0 w-full p-margin-page bg-surface/90 backdrop-blur-md pb-8 border-t border-outline-variant/20 z-50">
<button class="w-full h-[50px] bg-primary text-on-primary font-headline text-headline rounded-full flex items-center justify-center active:scale-95 transition-transform shadow-[0px_4px_12px_rgba(0,0,0,0.05)]" type="button">
            Continue
        </button>
</div>
<script>
        function toggleSegment(button, group) {
            // Find parent container
            const container = button.parentElement;
            // Get all buttons in this segment group
            const buttons = container.querySelectorAll('button');
            
            // Reset all to inactive
            buttons.forEach(btn => {
                btn.classList.remove('segmented-control-active');
                btn.classList.add('segmented-control-inactive');
            });
            
            // Set clicked to active
            button.classList.remove('segmented-control-inactive');
            button.classList.add('segmented-control-active');
        }

        function selectGoal(selectedCard) {
            // Get all goal cards
            const container = selectedCard.parentElement;
            const cards = container.querySelectorAll('button');
            
            // Reset all cards
            cards.forEach(card => {
                card.classList.remove('goal-card-active');
                
                // Reset icon background
                const iconContainer = card.querySelector('.rounded-full');
                iconContainer.classList.remove('bg-primary/10');
                iconContainer.classList.add('bg-surface-variant');
                
                // Reset icon color
                const icon = card.querySelector('.goal-icon');
                icon.classList.remove('text-primary');
                icon.classList.add('text-on-surface-variant');
                
                // Hide checkmark
                const checkIcon = card.querySelector('.check-icon');
                checkIcon.classList.remove('opacity-100');
                checkIcon.classList.add('opacity-0');
            });
            
            // Set selected card active
            selectedCard.classList.add('goal-card-active');
            
            // Update icon background
            const selectedIconContainer = selectedCard.querySelector('.rounded-full');
            selectedIconContainer.classList.remove('bg-surface-variant');
            selectedIconContainer.classList.add('bg-primary/10');
            
            // Update icon color
            const selectedIcon = selectedCard.querySelector('.goal-icon');
            selectedIcon.classList.remove('text-on-surface-variant');
            selectedIcon.classList.add('text-primary');
            
            // Show checkmark
            const selectedCheckIcon = selectedCard.querySelector('.check-icon');
            selectedCheckIcon.classList.remove('opacity-0');
            selectedCheckIcon.classList.add('opacity-100');
        }
    </script>
</body></html>
